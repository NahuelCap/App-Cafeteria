<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cafetería</title>
  <link rel="apple-touch-icon" href="imagenes/logo.png">
  <link rel="icon" type="image/png" href="imagenes/logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2C1A0E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cafetería">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #F5EFE6;
      --espresso: #2C1A0E;
      --terracota:#C4603A;
      --latte:    #8B6550;
      --cream:    #FAF6F0;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(196,96,58,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(139,101,80,0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    /* patron de puntos suave */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(92,61,46,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .splash { text-align: center; animation: fadeIn 0.6s ease both; position: relative; z-index:1; }
    .logo-ring {
      width: 116px; height: 116px;
      border-radius: 28px;
      border: 2px solid rgba(196,96,58,0.4);
      padding: 6px;
      margin: 0 auto 28px;
      background: white;
      box-shadow: 0 8px 40px rgba(44,26,14,0.15), 0 0 0 6px rgba(196,96,58,0.08);
      animation: scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .logo-ring img {
      width: 100%; height: 100%;
      border-radius: 22px;
      object-fit: cover;
    }
    .splash-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px; font-weight: 900;
      color: var(--espresso);
      letter-spacing: 0.04em; line-height: 1.05;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .splash-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--latte);
      margin-top: 10px;
      animation: fadeUp 0.7s 0.35s ease both;
    }
    .splash-line {
      width: 0; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--terracota), transparent);
      margin: 22px auto;
      animation: expandLine 0.8s 0.5s ease both;
    }
    .splash-loader {
      display: flex; gap: 8px; justify-content: center;
      animation: fadeUp 0.5s 0.7s ease both;
    }
    .splash-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--terracota); opacity: 0.25;
    }
    .splash-dot:nth-child(1) { animation: dotPulse 1.2s 0.8s infinite; }
    .splash-dot:nth-child(2) { animation: dotPulse 1.2s 1.0s infinite; }
    .splash-dot:nth-child(3) { animation: dotPulse 1.2s 1.2s infinite; }
    @keyframes fadeIn    { from{opacity:0;} to{opacity:1;} }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    @keyframes scaleIn   { from{opacity:0;transform:scale(0.75);} to{opacity:1;transform:scale(1);} }
    @keyframes expandLine{ from{width:0;} to{width:60px;} }
    @keyframes dotPulse  { 0%,100%{opacity:0.2;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.2);} }
    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeOut { to{opacity:0;transform:scale(1.02);} }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="logo-ring">
      <img src="imagenes/logo.png" alt="Logo">
    </div>
    <div class="splash-title">MI<br>CAFETERÍA</div>
    <div class="splash-sub">Cafetería &amp; Pastelería</div>
    <div class="splash-line"></div>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <script>
    setTimeout(() => {
      document.getElementById("splash").classList.add("fade-out");
      setTimeout(() => { window.location.href = "index.html"; }, 500);
    }, 2400);
  </script>
<script src="config-loader.js"></script>
</body>
</html>
