<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesas — Mi Cafetería</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="imagenes/logo.png">
  <style>
    .header-mozo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: rgba(28,20,12,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .header-back:hover { color: var(--cream); border-color: var(--gold-mid); }
    .header-mozo-info { text-align: right; }
    .header-mozo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--cream);
    }
    .header-mozo-sub { font-size: 12px; color: var(--muted); }

    .leyenda {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 14px 16px 10px;
      flex-wrap: wrap;
    }
    .leyenda-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; color: var(--muted);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.libre   { background: #3D6B3A; }
    .dot.ocupada { background: #B85040; }

    .mesas {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 0 auto 30px;
      padding: 0 14px;
    }
    .mesa {
      aspect-ratio: 1;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.18s ease;
      letter-spacing: 0.01em;
      line-height: 1.2;
      width: 100%;
      gap: 2px;
    }
    .mesa .mesa-icono { font-size: 16px; }
    .mesa .mesa-num  { font-size: 13px; font-weight: 700; }
    .mesa:active { transform: scale(0.93); }
    .mesa.libre {
      background: rgba(61,107,58,0.18);
      border-color: rgba(61,107,58,0.4);
      color: #7DC47A;
    }
    .mesa.ocupada {
      background: rgba(184,80,64,0.2);
      border-color: rgba(184,80,64,0.45);
      color: #E08878;
    }
    @media (max-width: 380px) {
      .mesas { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }
  </style>
</head>
<body class="con-fondo-secundario" style="padding:0;">

  <div class="header-mozo">
    <a href="login.html" class="header-back">← Salir</a>
    <div class="header-mozo-info">
      <div class="header-mozo-name" id="nombreEmpleado">—</div>
      <div class="header-mozo-sub">Seleccioná una mesa</div>
    </div>
  </div>

  <div class="leyenda">
    <div class="leyenda-item"><span class="dot libre"></span> Libre</div>
    <div class="leyenda-item"><span class="dot ocupada"></span> Ocupada</div>
  </div>

  <div class="mesas" id="contenedorMesas"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBEoaT_ldwRxBlRe6dpAc2WKBWcbjlmHp0",
  authDomain: "app-cafeteria-c4518.firebaseapp.com",
  databaseURL: "https://app-cafeteria-c4518-default-rtdb.firebaseio.com",
  projectId: "app-cafeteria-c4518",
  storageBucket: "app-cafeteria-c4518.firebasestorage.app",
  messagingSenderId: "1046878638257",
  appId: "1:1046878638257:web:2a93aa93b8e43570c75290"
};

    let app;
    try { app = initializeApp(firebaseConfig); }
    catch(e) { app = initializeApp(firebaseConfig, "mesas-" + Date.now()); }
    const db  = getDatabase(app);

    const empleado   = sessionStorage.getItem("mozo") || sessionStorage.getItem("mozoSeleccionado");
    const contenedor = document.getElementById("contenedorMesas");

    if (!empleado) {
      alert("No hay empleado seleccionado");
      window.location.href = "index.html";
    }

    document.getElementById("nombreEmpleado").textContent = empleado;

    window.abrirMesa = function(numero) {
      sessionStorage.setItem("mesa", numero);
      window.location.href = "pedido.html";
    };

    function renderizarMesas(datosEmpleado) {
      contenedor.innerHTML = "";
      for (let i = 1; i <= 32; i++) {
        const ocupada = datosEmpleado && datosEmpleado[i];
        const boton = document.createElement("button");
        boton.className = "mesa " + (ocupada ? "ocupada" : "libre");
        boton.innerHTML =
          '<span class="mesa-icono">' + (ocupada ? "☕" : "🪑") + '</span>' +
          '<span class="mesa-num">' + i + '</span>';
        boton.onclick = function() { abrirMesa(i); };
        contenedor.appendChild(boton);
      }
    }

    onValue(ref(db, "mesas/" + empleado), function(snapshot) {
      renderizarMesas(snapshot.exists() ? snapshot.val() : {});
    });
  </script>

<script src="config-loader.js"></script>
</body>
</html>
